name: LGRemote
options:
  bundleIdPrefix: com.benjamin
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "6"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: YLB7ZU62FE

targets:
  LGRemote:
    type: application
    platform: iOS
    sources:
      - LGRemote
      - Shared
    dependencies:
      - target: GoodRemoteWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjamin.LGRemote
        # iPhone only — project-level TARGETED_DEVICE_FAMILY doesn't stick on the
        # target, and shipping [1,2] makes App Store Connect demand iPad screenshots.
        TARGETED_DEVICE_FAMILY: "1"
        # Multicast entitlement (granted by Apple 2026-07-10) — required for the
        # Wake-on-LAN broadcast that wakes a deep-sleeping TV.
        CODE_SIGN_ENTITLEMENTS: LGRemote/LGRemote.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # Local/dev builds show "TV Remote"; the App Store bundle name must stay
        # "Good Remote" because "TV Remote" is already taken (ITMS-90129).
        # Debug signs manually against API-created profiles (CLI has no Xcode
        # account); Release archives via automatic + -allowProvisioningUpdates.
        Debug:
          APP_DISPLAY_NAME: TV Remote
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LGRemote Development
        Release:
          APP_DISPLAY_NAME: Good Remote
          CODE_SIGN_STYLE: Automatic
    info:
      path: LGRemote/Info.plist
      properties:
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        # xcodegen writes a literal "1" otherwise, and uploads get silently
        # auto-renumbered by manageAppVersionAndBuildNumber.
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIRequiresFullScreen: true
        NSSupportsLiveActivities: true
        NSLocalNetworkUsageDescription: This app connects to your TV over the local network to control it.
        NSBonjourServices: [_webos-second-screen._tcp, _airplay._tcp]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

  GoodRemoteWidget:
    type: app-extension
    platform: iOS
    sources:
      - GoodRemoteWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjamin.LGRemote.Widget
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: LGRemote Widget Development
        Release:
          CODE_SIGN_STYLE: Automatic
    info:
      path: GoodRemoteWidget/Info.plist
      properties:
        CFBundleDisplayName: Good Remote
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSLocalNetworkUsageDescription: This controls your TV over the local network.
        NSBonjourServices: [_webos-second-screen._tcp, _airplay._tcp]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  LGRemote:
    build:
      targets:
        LGRemote: all
    run:
      config: Debug
    archive:
      config: Release
