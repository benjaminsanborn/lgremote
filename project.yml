name: LGRemote
options:
  bundleIdPrefix: com.benjamin
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"

targets:
  LGRemote:
    type: application
    platform: iOS
    sources:
      - LGRemote
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benjamin.LGRemote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: LGRemote/Info.plist
      properties:
        CFBundleDisplayName: LG Remote
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: LG Remote connects to LG TVs on your local network to control them.
        NSBonjourServices: [_webos-second-screen._tcp, _airplay._tcp]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

schemes:
  LGRemote:
    build:
      targets:
        LGRemote: all
    run:
      config: Debug
    archive:
      config: Release
